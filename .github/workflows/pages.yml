name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install Pagefind
        run: |
          wget https://github.com/CloudCannon/pagefind/releases/download/v1.1.1/pagefind-v1.1.1-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf pagefind-v1.1.1-x86_64-unknown-linux-gnu.tar.gz
          sudo mv pagefind /usr/local/bin/
          pagefind --version

      - name: Build Jekyll
        run: bundle exec jekyll build --baseurl="/insight"
        env:
          JEKYLL_ENV: production

      - name: Run Pagefind
        run: pagefind --site _site --output-subdir _site/pagefind

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
