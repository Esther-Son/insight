title: "note"
description: "인사이트"
author: "Esther-Son"
github_username: "Esther-Son"
baseurl: "/note"
url: "https://esther-son.github.io"

lang: ko-KR

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: ~

defaults:
  # Posts
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "note"
  # All other pages default to note layout
  - scope:
      path: ""
    values:
      layout: "note"
  # Home
  - scope:
      path: "index.md"
    values:
      layout: "default"

exclude:
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - "*.log"
  - .playwright-mcp

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Pagination
paginate: 20
paginate_path: "/page:num/"

# Permalink
permalink: /posts/:year/:month/:day/:title.html

timezone: Asia/Seoul
