---
layout: default
---

<div class="post-header">
    <a href="javascript:history.back()" class="post-back">
        {% include icons/chevron-left.html %}
        Back
    </a>
    <div class="pc-meta">
        {% if page.date %}
        <span>{{ page.date | date: "%Y. %m. %d" }}</span>
        {% if page.categories and page.categories.size > 0 %}
        <span style="opacity:0.4">·</span>
        <span>{{ page.categories | join: ", " }}</span>
        {% endif %}
        <span style="opacity:0.4">·</span>
        <button class="copy-btn" id="copy-post-btn" onclick="copyContent()" title="Copy content">
            {% include icons/copy.html %}
            {% include icons/check.html %}
            <span class="copy-text">Copy</span>
        </button>
        {% endif %}
    </div>
</div>

<article class="post-content">
    {{ content }}
</article>

<script>
    function copyContent() {
        var text = document.querySelector('.post-content').innerText;
        var btn = document.getElementById('copy-post-btn');
        navigator.clipboard.writeText(text).then(function () {
            btn.classList.add('copied');
            btn.querySelector('.copy-text').textContent = 'Copied!';
            setTimeout(function () {
                btn.classList.remove('copied');
                btn.querySelector('.copy-text').textContent = 'Copy';
            }, 2000);
        });
    }
</script>
